    <script>
      (function() {
        var RELOAD_KEY = 'star_arena_auto_reload';
        var now = Date.now();
        var lastReload = localStorage.getItem(RELOAD_KEY);
        if (lastReload && (now - parseInt(lastReload)) < 10000) return;
        setTimeout(function() {
          var root = document.getElementById('root');
          if (!root || !root.hasChildNodes()) {
            localStorage.setItem(RELOAD_KEY, now.toString());
            window.location.reload();
          }
        }, 1100);
      })();
