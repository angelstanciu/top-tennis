spring:
  application:
    name: top-tennis
  datasource:
    url: ${DB_URL:jdbc:h2:file:./.localdb/tennisdb;AUTO_SERVER=TRUE;MODE=PostgreSQL}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: false

  mail:
    host: smtp.zoho.eu
    port: 465
    username: rezervari@star-arena.ro
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls.enable: false
          ssl.enable: true
          socketFactory.port: 465
          socketFactory.class: javax.net.ssl.SSLSocketFactory

app:
  base-url: ${APP_BASE_URL:https://star-arena.ro}

sms:
  mode: ${SMS_MODE:production}
  port: ${SMS_PORT:/dev/serial/by-id/usb-HUAWEI_Technology_HUAWEI_Mobile-if00-port0}
  baud: 115200
  clubNumber: ${SMS_CLUB_NUMBER:+40742197487}
  adminNotificationNumber: ${SMS_ADMIN_NUMBER:+40742197487}
  commandTimeoutMs: 4000
  sendTimeoutMs: 20000

logging:
  level:
    com.toptennis: INFO

reminder:
  mockSms: false

google:
  auth:
    client-id: ${GOOGLE_CLIENT_ID:337840626682-f4c0aj43u6pbiba781bfhqrlfc9q0tde.apps.googleusercontent.com}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:604800000}

admin:
  username: ${ADMIN_USERNAME:cosmin}
  password: ${ADMIN_PASSWORD:Cosmin123}

server:
  port: 8080
  forward-headers-strategy: framework
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
