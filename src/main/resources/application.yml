spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sportbase}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
