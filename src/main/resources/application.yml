spring:
  application:
    name: top-tennis
  datasource:
    # Use file-based H2 for dev so data persists between restarts
    url: jdbc:h2:file:./.localdb/tennisdb;AUTO_SERVER=TRUE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: smtp.zoho.eu
    port: 465
    username: rezervari@star-arena.ro
    password: qWiZF33Br1rc
    properties:
      mail:
        smtp:
          auth: true
          starttls.enable: false
          ssl.enable: true
          socketFactory.port: 465
          socketFactory.class: javax.net.ssl.SSLSocketFactory

sms:

logging:
  level:
    com.toptennis: INFO

reminder:
  firstBatchHour: 09:00
  firstBatchIntervals: 10:00-23:59
  secondBatchHour: 18:00
  secondBatchIntervals: 00:00-09:59
  mockSms: false

google:
