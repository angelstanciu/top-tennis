    <script>
      // Fix for blank page issue: if React hasn't mounted in 1.1s, reload once.
      (function() {
        const RELOAD_KEY = 'star_arena_auto_reload';
        const now = Date.now();
        const lastReload = localStorage.getItem(RELOAD_KEY);
        
        // Prevent infinite reload loops (max once per 10 seconds)
        if (lastReload && (now - parseInt(lastReload)) < 10000) {
          return;
        }

        setTimeout(function() {
          const root = document.getElementById('root');
          if (!root || !root.hasChildNodes()) {
            console.warn('Blank page detected, performing emergency reload...');
            localStorage.setItem(RELOAD_KEY, now.toString());
            window.location.reload();
          }
        }, 1100);
      })();
    </script>
